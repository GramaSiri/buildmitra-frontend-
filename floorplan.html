<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Floor Plan – Drg3.png Style</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: white; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); padding: 20px; display: inline-block; }
        canvas { display: block; margin: 0 auto; border: 1px solid #ccc; border-radius: 8px; background: #fef9e4; }
        .buttons { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }
        button { background: #10b981; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .info { margin-top: 16px; font-size: 12px; color: #4b5563; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="text-align:center; margin-bottom:16px;">📐 2D Floor Plan (Drg3.png)</h1>
    <canvas id="floorCanvas" width="1000" height="700"></canvas>
    <div class="buttons">
        <button id="boqBtn">🧮 Estimate BOQ</button>
        <button id="csvBtn">📎 Export CSV</button>
        <button id="whatsappBtn">📱 WhatsApp</button>
        <button id="printBtn">🖨️ Print</button>
    </div>
    <div class="info">
        ✅ Matches your image: rooms, doors (arcs), windows, UG tank, compound wall, gate, dimensions, scale bar.<br>
        📝 Edit the <code>rooms</code> array inside this file to modify sizes/positions.
    </div>
</div>
<script>
    (function() {
        const canvas = document.getElementById('floorCanvas');
        const ctx = canvas.getContext('2d');
        const scale = 12;          // pixels per foot
        const offX = 100, offY = 120;

        // ----- Room data (from Drg3.png) -----
        const rooms = [
            { name: 'TOILET 1 Common', x: 4, y: 4, w: 4, h: 6, doors: [{ side: 'bottom', pos: 2 }] },
            { name: 'TOILET 2 Common', x: 12, y: 4, w: 4, h: 6, doors: [{ side: 'bottom', pos: 2 }] },
            { name: 'KITCHEN', x: 4, y: 10, w: 10, h: 10, doors: [{ side: 'bottom', pos: 5 }], windows: [{ side: 'top', pos: 4, len: 4 }] },
            { name: 'UTILITY', x: 14, y: 12, w: 4, h: 8, doors: [{ side: 'right', pos: 4 }] },
            { name: 'BEDROOM 1', x: 18, y: 4, w: 12, h: 14, doors: [{ side: 'left', pos: 7 }], windows: [{ side: 'right', pos: 6, len: 5 }] },
            { name: 'BEDROOM 4/10\'x10\'', x: 4, y: 22, w: 10, h: 10, doors: [{ side: 'top', pos: 5 }] },
            { name: 'DINING AREA', x: 14, y: 22, w: 10, h: 12, doors: [] },
            { name: 'FAMILY LOUNGE', x: 14, y: 34, w: 10, h: 12, doors: [] },
            { name: 'BALCONY', x: 4, y: 34, w: 10, h: 4, doors: [{ side: 'bottom', pos: 5 }] },
            { name: 'LIFT', x: 30, y: 4, w: 3, h: 4, doors: [{ side: 'bottom', pos: 1.5 }] }
        ];

        const ugTank = { x: 48, y: 38, w: 6, h: 8, label: 'UG TANK appr. 6\'x8\'' };
        const gate = { x: 0, y: 46, w: 18, label: 'MAIN SLIDING GATE' };
        const compoundWall = true;

        const dimensions = [
            { from: { x: 0, y: 0 }, to: { x: 40, y: 0 }, label: "40'0\"", yOff: -12 },
            { from: { x: 0, y: 0 }, to: { x: 0, y: 46 }, label: "30'0\"", xOff: -20 },
            { from: { x: 4, y: 4 }, to: { x: 8, y: 4 }, label: "4'0\"", yOff: -12 },
            { from: { x: 4, y: 10 }, to: { x: 14, y: 10 }, label: "10'0\"", yOff: -12 },
            { from: { x: 18, y: 4 }, to: { x: 30, y: 4 }, label: "12'0\"", yOff: -12 }
        ];

        // ----- Drawing helpers -----
        function drawWallSegment(x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#1e293b';
            ctx.stroke();
        }

        function drawRoom(room) {
            const x = offX + room.x * scale;
            const y = offY + room.y * scale;
            const w = room.w * scale;
            const h = room.h * scale;
            ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = '#1e293b';
            ctx.font = '10px sans-serif';
            ctx.fillText(room.name, x + 4, y + 14);
            ctx.fillText(`${room.w}'x${room.h}'`, x + 4, y + 26);
        }

        function drawDoor(x, y, side, size = 2.5) {
            const r = size * scale;
            ctx.beginPath();
            switch (side) {
                case 'bottom': ctx.arc(x, y, r, 0, Math.PI / 2); break;
                case 'top':    ctx.arc(x, y, r, Math.PI, 3 * Math.PI / 2); break;
                case 'left':   ctx.arc(x, y, r, 3 * Math.PI / 2, 2 * Math.PI); break;
                case 'right':  ctx.arc(x, y, r, Math.PI / 2, Math.PI); break;
                default:       ctx.arc(x, y, r, 0, 2 * Math.PI);
            }
            ctx.stroke();
        }

        function drawWindow(x, y, len = 3) {
            const w = len * scale;
            const h = 3;
            ctx.fillStyle = '#b0c4de';
            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);
        }

        function drawPlan() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fef9e4';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Compound wall (dashed)
            if (compoundWall) {
                ctx.setLineDash([5, 8]);
                ctx.strokeStyle = '#64748b';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(offX - 12, offY - 12, 52 * scale + 24, 52 * scale + 24);
                ctx.setLineDash([]);
            }

            // UG tank
            if (ugTank) {
                const ux = offX + ugTank.x * scale;
                const uy = offY + ugTank.y * scale;
                ctx.fillStyle = '#e2e8f0';
                ctx.fillRect(ux, uy, ugTank.w * scale, ugTank.h * scale);
                ctx.strokeRect(ux, uy, ugTank.w * scale, ugTank.h * scale);
                ctx.fillStyle = '#1e293b';
                ctx.font = '9px sans-serif';
                ctx.fillText(ugTank.label, ux + 4, uy + 12);
            }

            // Rooms
            rooms.forEach(room => drawRoom(room));

            // Doors
            rooms.forEach(room => {
                const x0 = offX + room.x * scale;
                const y0 = offY + room.y * scale;
                const w = room.w * scale;
                const h = room.h * scale;
                if (room.doors) {
                    room.doors.forEach(door => {
                        let dx = x0, dy = y0;
                        if (door.side === 'bottom') { dx = x0 + door.pos * scale; dy = y0 + h; }
                        else if (door.side === 'top')    { dx = x0 + door.pos * scale; dy = y0; }
                        else if (door.side === 'left')   { dx = x0; dy = y0 + door.pos * scale; }
                        else if (door.side === 'right')  { dx = x0 + w; dy = y0 + door.pos * scale; }
                        drawDoor(dx, dy, door.side);
                    });
                }
            });

            // Windows
            rooms.forEach(room => {
                const x0 = offX + room.x * scale;
                const y0 = offY + room.y * scale;
                const w = room.w * scale;
                const h = room.h * scale;
                if (room.windows) {
                    room.windows.forEach(win => {
                        let wx = x0, wy = y0;
                        const len = win.len || 3;
                        if (win.side === 'bottom') { wx = x0 + win.pos * scale; wy = y0 + h - 3; }
                        else if (win.side === 'top')    { wx = x0 + win.pos * scale; wy = y0 - 3; }
                        else if (win.side === 'left')   { wx = x0 - 3; wy = y0 + win.pos * scale; }
                        else if (win.side === 'right')  { wx = x0 + w - 3; wy = y0 + win.pos * scale; }
                        drawWindow(wx, wy, len);
                    });
                }
            });

            // Gate
            if (gate) {
                const gx = offX + gate.x * scale;
                const gy = offY + gate.y * scale;
                ctx.fillStyle = '#94a3b8';
                ctx.fillRect(gx, gy, gate.w * scale, 5);
                ctx.fillStyle = '#1e293b';
                ctx.fillText(gate.label, gx + 4, gy + 12);
            }

            // External dimensions
            dimensions.forEach(dim => {
                const x1 = offX + dim.from.x * scale;
                const y1 = offY + dim.from.y * scale;
                const x2 = offX + dim.to.x * scale;
                const y2 = offY + dim.to.y * scale;
                ctx.beginPath();
                ctx.moveTo(x1, y1 + (dim.yOff || 0));
                ctx.lineTo(x2, y2 + (dim.yOff || 0));
                ctx.stroke();
                if (dim.xOff) {
                    ctx.beginPath();
                    ctx.moveTo(offX + dim.from.x * scale + dim.xOff, y1);
                    ctx.lineTo(offX + dim.from.x * scale + dim.xOff, y2);
                    ctx.stroke();
                }
                const midX = (x1 + x2) / 2;
                const midY = y1 + (dim.yOff || 0) - 8;
                ctx.fillStyle = '#1e293b';
                ctx.fillText(dim.label, midX - 10, midY);
            });

            // Scale bar
            const barLen = 60;
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(offX, offY - 25, barLen, 2);
            ctx.fillRect(offX, offY - 30, 3, 10);
            ctx.fillRect(offX + barLen, offY - 30, 3, 10);
            ctx.fillText(Math.round(barLen / scale) + "'", offX + barLen / 2 - 6, offY - 32);
            ctx.fillText("SCALE", offX + barLen / 2 - 12, offY - 40);

            // Title blocks
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText("GROUND FLOOR PLAN", offX + 10, offY - 60);
            ctx.fillText("SECOND FLOOR PLAN", offX + 250, offY - 60);
            ctx.fillText("FRONT (MODERN) ELEVATION", offX + 520, offY - 60);
        }

        // BOQ functions
        function calculateBOQ() {
            let totalFloor = 0, totalWall = 0, totalDoors = 0, totalWindows = 0;
            rooms.forEach(r => {
                totalFloor += r.w * r.h;
                totalWall += 2 * (r.w + r.h) * 10;
                totalDoors += r.doors ? r.doors.length : 0;
                totalWindows += r.windows ? r.windows.length : 0;
            });
            const netWall = totalWall - (totalDoors * 21) - (totalWindows * 12);
            const blockWork = netWall * 0.8;
            const cement = Math.ceil(totalFloor * 0.5);
            const sand = totalFloor * 0.8;
            alert(`🏗️ BOQ Estimate\nFloor: ${totalFloor} sqft\nWall (net): ${netWall} sqft\nBlocks: ${blockWork.toFixed(0)} sqft\nCement: ${cement} bags\nSand: ${sand.toFixed(0)} cft\nDoors: ${totalDoors}\nWindows: ${totalWindows}`);
        }

        function exportCSV() {
            let totalFloor = 0, totalDoors = 0, totalWindows = 0;
            rooms.forEach(r => {
                totalFloor += r.w * r.h;
                totalDoors += r.doors ? r.doors.length : 0;
                totalWindows += r.windows ? r.windows.length : 0;
            });
            const rows = [['Item','Quantity','Unit'], ['Floor Area',totalFloor,'sqft'], ['Doors',totalDoors,'nos'], ['Windows',totalWindows,'nos']];
            const csv = rows.map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'floor_plan_boq.csv';
            a.click();
            URL.revokeObjectURL(url);
        }

        function shareWhatsApp() {
            let totalFloor = 0, totalDoors = 0;
            rooms.forEach(r => { totalFloor += r.w * r.h; totalDoors += r.doors ? r.doors.length : 0; });
            const msg = `🏠 Floor Plan BOQ\nFloor Area: ${totalFloor} sqft\nDoors: ${totalDoors}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        drawPlan();

        document.getElementById('boqBtn').addEventListener('click', calculateBOQ);
        document.getElementById('csvBtn').addEventListener('click', exportCSV);
        document.getElementById('whatsappBtn').addEventListener('click', shareWhatsApp);
        document.getElementById('printBtn').addEventListener('click', () => window.print());
    })();
</script>
</body>
</html>
